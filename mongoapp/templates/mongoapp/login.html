{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - Automotora</title>
    <link rel="stylesheet" href="{% static 'mongoapp/style.css' %}">
</head>
<body>
    <div class="login-page">
        <div class="login-panel">
            <h1>Bienvenido</h1>
            <p>Ingresa con tus credenciales para acceder a la vista de administración o la vista de cliente.</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" value="{{ username }}" required>

                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required>

                <div class="login-actions">
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                </div>
            </form>

            <div class="login-hint">
                <p>Usa las credenciales básicas:</p>
                <p><strong>Admin:</strong> admin / admin123</p>
                <p><strong>Cliente:</strong> cliente / cliente123</p>
            </div>
        </div>
    </div>
</body>
</html>
