{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Vehículo</title>
    <link rel="stylesheet" href="{% static 'mongoapp/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="delete-wrap">
            <div class="warning-panel">
                <span class="warning-tag">Atención</span>
                <span class="warning-icon" aria-hidden="true">⚠️</span>
                <h1>¿Eliminar vehículo?</h1>
                <p>¿Estás seguro que deseas eliminar <strong>{{ object }}</strong>? Esta acción es permanente y no puede deshacerse.</p>
            </div>

            <form method="post" class="form-actions">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'vehiculo-list' %}" class="btn btn-primary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
