{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if object %}Editar{% else %}Agregar{% endif %} Vehículo</title>
    <link rel="stylesheet" href="{% static 'mongoapp/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>{% if object %}Editar Vehículo{% else %}Agregar Vehículo{% endif %}</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'vehiculo-list' %}" class="btn btn-danger">Cancelar</a>
        </form>
    </div>
</body>
</html>
